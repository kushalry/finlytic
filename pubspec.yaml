name: finlytic
description: "A new Flutter project."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.5.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.0

  # Utilities
  intl: ^0.19.0 # Currency/date formatting
  freezed_annotation: ^2.4.4 # Immutable data classes
  json_annotation: ^4.9.0

  # UI
  fl_chart: ^0.69.0 # Charts for dashboard
  google_fonts: ^6.2.1
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  drift_dev: ^2.22.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # Testing
  mocktail: ^1.0.4

flutter:

  uses-material-design: true
